name: Sync Resultados

on:
  schedule:
    - cron: '4,19,34,49 * * * *'   # a cada 15 min, fora dos minutos cheios congestionados do GitHub
  workflow_dispatch:          # permite rodar manualmente

jobs:
  sync:
    name: Buscar resultados
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de resultados
        run: |
          curl -sf --max-time 30 -X GET "${{ secrets.APP_URL }}/api/cron/resultados" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
